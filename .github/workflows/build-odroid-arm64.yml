name: Build ODROID ARM64 Kernel

on:
  push:
    paths:
      - "config-6.1.0-odroid-arm64"
      - "arch/**"
      - "block/**"
      - "certs/**"
      - "crypto/**"
      - "Documentation/**"
      - "drivers/**"
      - "fs/**"
      - "include/**"
      - "init/**"
      - "io_uring/**"
      - "ipc/**"
      - "kernel/**"
      - "lib/**"
      - "mm/**"
      - "net/**"
      - "rust/**"
      - "samples/**"
      - "scripts/**"
      - "security/**"
      - "sound/**"
      - "tools/**"
      - "usr/**"
      - "virt/**"
      - "Makefile"
      - "Kconfig"
      - ".github/workflows/build-odroid-arm64.yml"
  pull_request:
    paths:
      - "config-6.1.0-odroid-arm64"
      - "arch/**"
      - "block/**"
      - "certs/**"
      - "crypto/**"
      - "Documentation/**"
      - "drivers/**"
      - "fs/**"
      - "include/**"
      - "init/**"
      - "io_uring/**"
      - "ipc/**"
      - "kernel/**"
      - "lib/**"
      - "mm/**"
      - "net/**"
      - "rust/**"
      - "samples/**"
      - "scripts/**"
      - "security/**"
      - "sound/**"
      - "tools/**"
      - "usr/**"
      - "virt/**"
      - "Makefile"
      - "Kconfig"
      - ".github/workflows/build-odroid-arm64.yml"
  workflow_dispatch:

jobs:
  build-deb-pkg:
    runs-on: ubuntu-24.04
    env:
      ARCH: arm64
      CROSS_COMPILE: aarch64-linux-gnu-

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get clean
          sudo dpkg --add-architecture arm64
          # Restrict existing sources to amd64 so apt doesn't try to fetch
          # arm64 packages from security.ubuntu.com (which doesn't host them)
          sudo sed -i 's/^deb \[/deb [arch=amd64 /; s/^deb http/deb [arch=amd64] http/' \
            /etc/apt/sources.list /etc/apt/sources.list.d/*.list 2>/dev/null || true
          # Add ports.ubuntu.com for arm64 packages
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse" \
            | sudo tee /etc/apt/sources.list.d/ubuntu-ports-arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse" \
            | sudo tee -a /etc/apt/sources.list.d/ubuntu-ports-arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse" \
            | sudo tee -a /etc/apt/sources.list.d/ubuntu-ports-arm64.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc \
            bison \
            build-essential \
            cpio \
            fakeroot \
            flex \
            gcc-aarch64-linux-gnu \
            kmod \
            libncurses-dev \
            libelf-dev \
            libssl-dev \
            libssl-dev:arm64 \
            python3 \
            rsync \
            debhelper \
            dpkg-dev \
            dwarves

      - name: Prepare config
        run: |
          mkdir -p out
          cp config-6.1.0-odroid-arm64 out/.config
          make O=out olddefconfig

      - name: Build Debian packages
        run: |
          make O=out -j"$(nproc)" KDEB_PKGVERSION="$(date +%Y%m%d)-${GITHUB_RUN_NUMBER:-0}" bindeb-pkg

      - name: Upload Debian package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: odroid-arm64-deb-packages
          path: |
            ../linux-*.deb
            ../linux-*.buildinfo
            ../linux-*.changes
